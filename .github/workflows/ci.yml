name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-instrumentation
    steps:
      - uses: actions/checkout@v5
        with:
          path: embedded/sigma-instrumentation

      - uses: actions/checkout@v5
        with:
          repository: sigmatactical-org/sigma-racer-telemetry
          path: embedded/sigma-racer-telemetry

      - uses: actions/checkout@v5
        with:
          repository: sigmatactical-org/sigma-racer-sidearm
          path: embedded/sigma-racer-sidearm

      - uses: actions/checkout@v5
        with:
          repository: sigmatactical-org/sigma-racer-cluster
          path: embedded/sigma-racer-cluster

      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-instrumentation
          add-rust-environment-hash-key: false
          key: ${{ hashFiles('embedded/sigma-instrumentation/Cargo.lock', 'embedded/sigma-instrumentation/Cargo.toml', 'embedded/sigma-instrumentation/rust-toolchain.toml', 'embedded/sigma-instrumentation/.cargo/config.toml') }}

      - name: Library tests
        run: cargo test -p sigma-instrumentation

      - name: Testbed build
        run: cargo build -p testbed --release

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-instrumentation
    steps:
      - uses: actions/checkout@v5
        with:
          path: embedded/sigma-instrumentation
      - uses: actions/checkout@v5
        with:
          repository: sigmatactical-org/sigma-racer-telemetry
          path: embedded/sigma-racer-telemetry
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
